<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>桌面宠物设置</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #fff5f5 0%, #fff0f5 100%);
      padding: 20px;
      color: #333;
    }

    .container {
      max-width: 360px;
    }

    h1 {
      font-size: 20px;
      color: #ff69b4;
      margin-bottom: 20px;
      text-align: center;
    }

    .setting-group {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 2px 10px rgba(255, 105, 180, 0.1);
    }

    .setting-group h3 {
      font-size: 14px;
      color: #666;
      margin-bottom: 12px;
    }

    .setting-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .setting-item:last-child {
      margin-bottom: 0;
    }

    .setting-item label {
      font-size: 14px;
    }

    input[type="range"] {
      width: 150px;
      accent-color: #ff69b4;
    }

    input[type="number"] {
      width: 80px;
      padding: 6px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      text-align: center;
    }

    input[type="number"]:focus {
      outline: none;
      border-color: #ff69b4;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 8px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #ff69b4 0%, #ff1493 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(255, 105, 180, 0.3);
    }

    .btn-secondary {
      background: #f5f5f5;
      color: #666;
    }

    .btn-secondary:hover {
      background: #eee;
    }

    .speed-value {
      font-size: 14px;
      color: #ff69b4;
      font-weight: bold;
      min-width: 30px;
      text-align: center;
    }

    .hint {
      font-size: 12px;
      color: #999;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>桌面宠物设置</h1>

    <div class="setting-group">
      <h3>基础设置</h3>
      <div class="setting-item">
        <label>走路速度</label>
        <div style="display: flex; align-items: center; gap: 10px;">
          <input type="range" id="walkSpeed" min="1" max="10" value="2">
          <span class="speed-value" id="speedValue">2</span>
        </div>
      </div>
    </div>

    <div class="setting-group">
      <h3>提醒设置</h3>
      <div class="setting-item">
        <label>喝水提醒 (分钟)</label>
        <input type="number" id="waterReminder" min="0" max="480" value="60">
      </div>
      <div class="hint">0 表示关闭提醒</div>
      <div class="setting-item" style="margin-top: 12px;">
        <label>上厕所提醒 (分钟)</label>
        <input type="number" id="toiletReminder" min="0" max="480" value="120">
      </div>
      <div class="hint">0 表示关闭提醒</div>
    </div>

    <div class="setting-group">
      <h3>素材管理</h3>
      <button class="btn btn-secondary" id="openAssetsBtn">打开素材文件夹</button>
      <div class="hint" style="margin-top: 8px;">
        在文件夹中添加/修改 GIF 动画素材
      </div>
    </div>

    <button class="btn btn-primary" id="saveBtn">保存设置</button>
  </div>

  <script>
    const { electronAPI } = window;

    async function loadSettings() {
      const config = await electronAPI.getConfig();
      document.getElementById('walkSpeed').value = config.walkSpeed || 2;
      document.getElementById('speedValue').textContent = config.walkSpeed || 2;
      document.getElementById('waterReminder').value = config.waterReminder || 60;
      document.getElementById('toiletReminder').value = config.toiletReminder || 120;
    }

    document.getElementById('walkSpeed').addEventListener('input', (e) => {
      document.getElementById('speedValue').textContent = e.target.value;
    });

    document.getElementById('openAssetsBtn').addEventListener('click', () => {
      electronAPI.openAssetsFolder();
    });

    document.getElementById('saveBtn').addEventListener('click', async () => {
      const config = {
        walkSpeed: parseInt(document.getElementById('walkSpeed').value),
        waterReminder: parseInt(document.getElementById('waterReminder').value),
        toiletReminder: parseInt(document.getElementById('toiletReminder').value)
      };

      await electronAPI.saveConfig(config);
      alert('设置已保存！');
    });

    loadSettings();
  </script>
</body>
</html>
